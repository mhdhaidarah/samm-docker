# SAMM Docker Compose — v3.6.12
# version: 3.6.12
# image-digest: sha256:cd1ecfaffb028313f5c4b10f3c8e526fa35a2c439c6c6d588465f39af1709cff
#
# CI substitutes 3.6.12 and sha256:cd1ecfaffb028313f5c4b10f3c8e526fa35a2c439c6c6d588465f39af1709cff at release time. Don't edit the
# resulting docker-compose.yml directly except via the operator install.sh —
# the host-updater.sh script downloads a fresh copy on each upgrade.
#
# Customer install:
#   curl -fsSL https://github.com/mhdhaidarah/samm-docker/releases/download/v3.6.12/install.sh | sudo bash
#
# Network:
#   - MikroTik NAS must point to the docker host's LAN IP for RADIUS.
#   - freeradius exposes UDP 1812/1813 on the host via compose port mapping.
#   - SAMM admin + customer portal at http://<host>:${SAMM_API_PORT:-8000}/
#
# Note: every SAMM service is written out in full (no YAML merge keys).
# Docker Compose v2 handles `<<: *anchor` fine, but stricter YAML 1.2 parsers
# (MikroTik's container feature, Portainer-on-RouterOS, kompose, etc.) reject
# it as "empty image name" because merge keys were dropped from YAML 1.2.
# Inlining keeps this compose file portable across all of them.

name: samm

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: samm
      POSTGRES_USER: samm
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      TZ: ${TZ:-UTC}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U samm -d samm"]
      interval: 10s
      timeout: 5s
      retries: 12

  samm-api:
    image: mhdhaidarah/samm@sha256:cd1ecfaffb028313f5c4b10f3c8e526fa35a2c439c6c6d588465f39af1709cff
    restart: unless-stopped
    command: ["api"]
    environment:
      # SAMM_ROLE is the parser-agnostic role dispatcher — Docker reads
      # `command:` above, MikroTik's container feature reads this env var
      # (it drops the `command:` field on YAML import). entrypoint.sh
      # prefers SAMM_ROLE; both agree per service so behavior is identical.
      SAMM_ROLE: api
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: samm
      POSTGRES_USER: samm
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: ${TZ:-UTC}
      SAMM_API_HOST: 0.0.0.0
      SAMM_API_PORT: 8000
      SAMM_API_WORKERS: 2
      # Optional WhatsApp QR bridge sidecar (see the wa-bridge service). On
      # Docker its URL + token come from here and override any saved config;
      # empty token when the bridge profile isn't enabled (harmless — the panel
      # only uses it when the WhatsApp provider is "qr").
      WA_BRIDGE_URL: http://wa-bridge:8787
      WA_BRIDGE_TOKEN: ${WA_BRIDGE_TOKEN:-}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${SAMM_API_PORT:-8000}:8000"
    volumes:
      - etcsamm:/etc/samm
      - sammvar:/opt/samm/var
      - sammlogs:/var/log/samm
      - sammlocales:/opt/samm/app/locales

  samm-radius:
    image: mhdhaidarah/samm@sha256:cd1ecfaffb028313f5c4b10f3c8e526fa35a2c439c6c6d588465f39af1709cff
    restart: unless-stopped
    command: ["radius"]
    environment:
      SAMM_ROLE: radius  # see samm-api notes — parser-agnostic role hint
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: samm
      POSTGRES_USER: samm
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: ${TZ:-UTC}
    depends_on:
      postgres:
        condition: service_healthy
      samm-api:
        condition: service_started
    volumes:
      - etcsamm:/etc/samm
      - sammvar:/opt/samm/var
      - sammlogs:/var/log/samm

  samm-worker:
    image: mhdhaidarah/samm@sha256:cd1ecfaffb028313f5c4b10f3c8e526fa35a2c439c6c6d588465f39af1709cff
    restart: unless-stopped
    command: ["worker"]
    environment:
      SAMM_ROLE: worker  # see samm-api notes — parser-agnostic role hint
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: samm
      POSTGRES_USER: samm
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: ${TZ:-UTC}
    depends_on:
      postgres:
        condition: service_healthy
      samm-api:
        condition: service_started
    cap_add:
      - NET_RAW
    sysctls:
      - net.ipv4.ping_group_range=0 2147483647
    volumes:
      - etcsamm:/etc/samm
      - sammvar:/opt/samm/var
      - sammlogs:/var/log/samm

  samm-notification:
    image: mhdhaidarah/samm@sha256:cd1ecfaffb028313f5c4b10f3c8e526fa35a2c439c6c6d588465f39af1709cff
    restart: unless-stopped
    command: ["notification"]
    environment:
      SAMM_ROLE: notification  # see samm-api notes — parser-agnostic role hint
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: samm
      POSTGRES_USER: samm
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: ${TZ:-UTC}
      # The notification worker sends WhatsApp — same bridge sidecar as samm-api.
      WA_BRIDGE_URL: http://wa-bridge:8787
      WA_BRIDGE_TOKEN: ${WA_BRIDGE_TOKEN:-}
    depends_on:
      postgres:
        condition: service_healthy
      samm-api:
        condition: service_started
    volumes:
      - etcsamm:/etc/samm
      - sammvar:/opt/samm/var
      - sammlogs:/var/log/samm

  samm-telegram:
    image: mhdhaidarah/samm@sha256:cd1ecfaffb028313f5c4b10f3c8e526fa35a2c439c6c6d588465f39af1709cff
    restart: unless-stopped
    command: ["telegram"]
    environment:
      SAMM_ROLE: telegram  # see samm-api notes — parser-agnostic role hint
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: samm
      POSTGRES_USER: samm
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: ${TZ:-UTC}
    depends_on:
      postgres:
        condition: service_healthy
      samm-api:
        condition: service_started
    volumes:
      - etcsamm:/etc/samm
      - sammvar:/opt/samm/var
      - sammlogs:/var/log/samm

  # WhatsApp QR bridge — the unofficial Baileys sidecar, as a fully self-contained
  # image (code + node_modules + git baked in by docker/wa-bridge.Dockerfile,
  # multi-arch amd64+arm64, digest-pinned like the app + freeradius images).
  # No bind-mount, no `command:` — so it runs identically on normal Docker AND on
  # MikroTik's RouterOS container feature (which drops `command:` and can't mount
  # host files). Part of the standard stack; it idles (no linked number, no
  # traffic) until an operator picks the "qr" WhatsApp provider. The official
  # Meta Cloud API path ignores it. Don't want it? `docker compose stop wa-bridge`.
  wa-bridge:
    image: mhdhaidarah/samm@sha256:28f49021391d9ae7c20c6cb17a2a56ba38e8c729000554bf54a189c5003a718a
    restart: unless-stopped
    environment:
      # Empty fallback so a missing token never blocks the stack (the bridge is
      # internal-only, not host-exposed); install.sh + host-updater.sh set it.
      WA_BRIDGE_TOKEN: ${WA_BRIDGE_TOKEN:-}
      TZ: ${TZ:-UTC}
    depends_on:
      - samm-api
    volumes:
      - wabridge_auth:/data/auth      # multi-device session — persists the QR link

  # Custom SAMM FreeRADIUS image (built from docker/freeradius.Dockerfile).
  # The stock freeradius image reads /etc/raddb (not /etc/freeradius/3.0) and
  # ships without libpq, so the SAMM RADIUS config is baked in + enabled at
  # build time; the DB password/host are filled into the SQL module from the
  # env below by the image entrypoint at startup. sha256:f796dbcb234409c07c3bd53e19549163577a135ca54d46687e3f5c3c0626ae6f is the multi-arch
  # image digest CI captures at release time.
  freeradius:
    image: mhdhaidarah/samm@sha256:f796dbcb234409c07c3bd53e19549163577a135ca54d46687e3f5c3c0626ae6f
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: ${TZ:-UTC}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "1812:1812/udp"
      - "1813:1813/udp"

volumes:
  pgdata: {}
  etcsamm: {}
  sammvar: {}
  sammlogs: {}
  sammlocales: {}
  wabridge_auth: {}      # WhatsApp bridge multi-device session
