# SAMM on a MikroTik router — docker-compose.mikrotik.yml (v3.9.1, arm64)
# version: 3.9.1
#
# PASTE-AND-GO on RouterOS: Container -> Apps -> New -> YAML — runs as-is.
# To set your own database password, find & replace EVERY occurrence of
# change-me-strong-random-string with the same strong value (the one-line
# installer does this for you automatically with a random password).
#
# Customer install (recommended — generates a strong password for you):
#   curl -fsSL https://github.com/mhdhaidarah/samm-docker/releases/download/v3.9.1/install.sh | sudo bash
#
# Running SAMM directly ON a MikroTik router? Use docker-compose.mikrotik.yml
# instead (same file, arm64-pinned images — RouterOS can't pick a CPU arch).
#
# Network:
#   - MikroTik NAS must point to the docker host's LAN IP for RADIUS.
#   - freeradius exposes UDP 1812/1813 on the host via compose port mapping.
#   - SAMM admin + customer portal at http://<host>:8000/
#
# Note: plain values only (no env-var interpolation, no YAML merge keys) — this
# keeps the file working on strict YAML 1.2 parsers and on MikroTik's RouterOS
# container feature, which passes env values literally.

name: samm

services:
  postgres:
    image: arm64v8/postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: samm
      POSTGRES_USER: samm
      # Paste-and-run default. CHANGE for a real deployment: replace EVERY
      # occurrence of this string in the file (the installer does it for you).
      POSTGRES_PASSWORD: change-me-strong-random-string
      TZ: UTC
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U samm -d samm"]
      interval: 10s
      timeout: 5s
      retries: 12

  samm-api:
    image: mhdhaidarah/samm:3.9.1-arm64
    restart: unless-stopped
    command: ["api"]
    environment:
      # SAMM_ROLE is the parser-agnostic role dispatcher — Docker reads
      # `command:` above, MikroTik's container feature reads this env var
      # (it drops the `command:` field on YAML import). entrypoint.sh
      # prefers SAMM_ROLE; both agree per service so behavior is identical.
      SAMM_ROLE: api
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: samm
      POSTGRES_USER: samm
      POSTGRES_PASSWORD: change-me-strong-random-string
      TZ: UTC
      SAMM_API_HOST: 0.0.0.0
      SAMM_API_PORT: 8000
      SAMM_API_WORKERS: 2
      # Optional WhatsApp QR bridge sidecar (see the wa-bridge service). On
      # Docker its URL + token come from here and override any saved config;
      # empty token when the bridge profile isn't enabled (harmless — the panel
      # only uses it when the WhatsApp provider is "qr").
      WA_BRIDGE_URL: http://wa-bridge:8787
      WA_BRIDGE_TOKEN: change-me-random-token
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - etcsamm:/etc/samm
      - sammvar:/opt/samm/var
      - sammlogs:/var/log/samm
      - sammlocales:/opt/samm/app/locales

  samm-radius:
    image: mhdhaidarah/samm:3.9.1-arm64
    restart: unless-stopped
    command: ["radius"]
    environment:
      SAMM_ROLE: radius  # see samm-api notes — parser-agnostic role hint
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: samm
      POSTGRES_USER: samm
      POSTGRES_PASSWORD: change-me-strong-random-string
      TZ: UTC
    depends_on:
      postgres:
        condition: service_healthy
      samm-api:
        condition: service_started
    volumes:
      - etcsamm:/etc/samm
      - sammvar:/opt/samm/var
      - sammlogs:/var/log/samm

  samm-worker:
    image: mhdhaidarah/samm:3.9.1-arm64
    restart: unless-stopped
    command: ["worker"]
    environment:
      SAMM_ROLE: worker  # see samm-api notes — parser-agnostic role hint
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: samm
      POSTGRES_USER: samm
      POSTGRES_PASSWORD: change-me-strong-random-string
      TZ: UTC
    depends_on:
      postgres:
        condition: service_healthy
      samm-api:
        condition: service_started
    cap_add:
      - NET_RAW
    sysctls:
      - net.ipv4.ping_group_range=0 2147483647
    volumes:
      - etcsamm:/etc/samm
      - sammvar:/opt/samm/var
      - sammlogs:/var/log/samm

  samm-notification:
    image: mhdhaidarah/samm:3.9.1-arm64
    restart: unless-stopped
    command: ["notification"]
    environment:
      SAMM_ROLE: notification  # see samm-api notes — parser-agnostic role hint
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: samm
      POSTGRES_USER: samm
      POSTGRES_PASSWORD: change-me-strong-random-string
      TZ: UTC
      # The notification worker sends WhatsApp — same bridge sidecar as samm-api.
      WA_BRIDGE_URL: http://wa-bridge:8787
      WA_BRIDGE_TOKEN: change-me-random-token
    depends_on:
      postgres:
        condition: service_healthy
      samm-api:
        condition: service_started
    volumes:
      - etcsamm:/etc/samm
      - sammvar:/opt/samm/var
      - sammlogs:/var/log/samm

  samm-telegram:
    image: mhdhaidarah/samm:3.9.1-arm64
    restart: unless-stopped
    command: ["telegram"]
    environment:
      SAMM_ROLE: telegram  # see samm-api notes — parser-agnostic role hint
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: samm
      POSTGRES_USER: samm
      POSTGRES_PASSWORD: change-me-strong-random-string
      TZ: UTC
    depends_on:
      postgres:
        condition: service_healthy
      samm-api:
        condition: service_started
    volumes:
      - etcsamm:/etc/samm
      - sammvar:/opt/samm/var
      - sammlogs:/var/log/samm

  # WhatsApp QR bridge — the unofficial Baileys sidecar, as a fully self-contained
  # image (code + node_modules + git baked in by docker/wa-bridge.Dockerfile,
  # multi-arch amd64+arm64, same version tag family as the app + freeradius).
  # No bind-mount, no `command:` — so it runs identically on normal Docker AND on
  # MikroTik's RouterOS container feature (which drops `command:` and can't mount
  # host files). Part of the standard stack; it idles (no linked number, no
  # traffic) until an operator picks the "qr" WhatsApp provider. The official
  # Meta Cloud API path ignores it. Don't want it? `docker compose stop wa-bridge`.
  wa-bridge:
    image: mhdhaidarah/samm:wa-bridge-3.9.1-arm64
    restart: unless-stopped
    environment:
      # Internal-only auth between SAMM and the bridge (not host-exposed);
      # install.sh + host-updater.sh replace it with a random value.
      WA_BRIDGE_TOKEN: change-me-random-token
      TZ: UTC
    depends_on:
      - samm-api
    volumes:
      - wabridge_auth:/data/auth      # multi-device session — persists the QR link

  # Custom SAMM FreeRADIUS image (built from docker/freeradius.Dockerfile).
  # The stock freeradius image reads /etc/raddb (not /etc/freeradius/3.0) and
  # ships without libpq, so the SAMM RADIUS config is baked in + enabled at
  # build time; the DB password/host are filled into the SQL module from the
  # env below by the image entrypoint at startup.
  freeradius:
    image: mhdhaidarah/samm:freeradius-3.9.1-arm64
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PASSWORD: change-me-strong-random-string
      TZ: UTC
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "1812:1812/udp"
      - "1813:1813/udp"

volumes:
  pgdata: {}
  etcsamm: {}
  sammvar: {}
  sammlogs: {}
  sammlocales: {}
  wabridge_auth: {}      # WhatsApp bridge multi-device session
